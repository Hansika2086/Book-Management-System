<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Book Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">My Book Manager</h1>
            <button onclick="openModal()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-indigo-700">Add New Book</button>
        </div>

        <div class="flex gap-4 mb-6">
            <input type="text" id="search" placeholder="Search by title or author..." oninput="loadData()" class="flex-1 p-3 border border-gray-300 rounded-lg shadow-sm">
            <input type="text" id="filter" placeholder="Filter by category..." oninput="loadData()" class="w-64 p-3 border border-gray-300 rounded-lg shadow-sm">
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">Title</th><th class="p-4">Author</th>
                        <th class="p-4">Category</th><th class="p-4">Price</th>
                        <th class="p-4">Available</th><th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="book-table"></tbody>
            </table>
            
            <div class="p-4 border-t flex justify-between items-center">
                <span id="page-info" class="text-gray-600">Page 1 of 1</span>
                <div class="flex gap-2">
                    <button onclick="changePage(-1)" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Previous</button>
                    <button onclick="changePage(1)" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Next</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg w-full max-w-sm">
            <h2 id="modal-title" class="text-xl font-bold mb-4">Add Book</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="title" placeholder="Book Title" class="w-full p-2 mb-3 border rounded">
            <input type="text" id="author" placeholder="Author" class="w-full p-2 mb-3 border rounded">
            <input type="text" id="category" placeholder="Category" class="w-full p-2 mb-3 border rounded">
            <input type="number" id="price" placeholder="Price ($)" class="w-full p-2 mb-3 border rounded">
            <label class="flex items-center gap-2 mb-6">
                <input type="checkbox" id="available"> Available to borrow
            </label>
            <div class="flex gap-3">
                <button onclick="saveBook()" class="flex-1 bg-indigo-600 text-white py-2 rounded font-semibold hover:bg-indigo-700">Save</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-300 py-2 rounded hover:bg-gray-400">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 0;

        async function loadData() {
            const query = document.getElementById('search').value;
            const category = document.getElementById('filter').value;
            
            let url = (query || category) 
                ? `/api/books/search?query=${query}&category=${category}&page=${currentPage}`
                : `/api/books?page=${currentPage}&size=5`;

            const res = await fetch(url);
            const data = await res.json();
            
            const tbody = document.getElementById('book-table');
            document.getElementById('page-info').innerText = `Page ${data.number + 1} of ${data.totalPages}`;
            
            tbody.innerHTML = data.content.map(b => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-semibold">${b.title}</td>
                    <td class="p-4 text-gray-600">${b.author}</td>
                    <td class="p-4">${b.category}</td>
                    <td class="p-4">$${b.price}</td>
                    <td class="p-4">${b.available ? '✅ Yes' : '❌ No'}</td>
                    <td class="p-4 flex gap-3">
                        <button onclick="editModal(${JSON.stringify(b).replace(/"/g, '&quot;')})" class="text-indigo-600 hover:underline">Edit</button>
                        <button onclick="deleteBook(${b.id})" class="text-red-600 hover:underline">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveBook() {
            const id = document.getElementById('edit-id').value;
            const book = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                available: document.getElementById('available').checked
            };

            await fetch(id ? `/api/books/${id}` : '/api/books', {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(book)
            });
            closeModal();
            loadData();
        }

        async function deleteBook(id) {
            if(confirm('Are you sure you want to delete this book?')) {
                await fetch(`/api/books/${id}`, { method: 'DELETE' });
                loadData();
            }
        }

        function changePage(dir) { currentPage = Math.max(0, currentPage + dir); loadData(); }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function editModal(b) {
            document.getElementById('edit-id').value = b.id;
            document.getElementById('title').value = b.title;
            document.getElementById('author').value = b.author;
            document.getElementById('category').value = b.category;
            document.getElementById('price').value = b.price;
            document.getElementById('available').checked = b.available;
            openModal();
        }

        loadData();
    </script>
</body>
</html>
